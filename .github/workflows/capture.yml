name: TradingView Chart Capture

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: '캡처할 종목 (예: NASDAQ:NDX, TSLA, AAPL)'
        required: true
        default: 'NASDAQ:NDX'

jobs:
  capture-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create auth.json from Secrets
        run: |
          echo '${{ secrets.TRADINGVIEW_AUTH }}' > auth.json
          ls -l auth.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxss1 libasound2 libgtk-3-0 libx11-xcb1 libxcomposite1 libxrandr2 libgbm1 libpango1.0-0 libatspi2.0-0 libcups2 libdrm2 libwayland-client0 libwayland-cursor0 fonts-liberation libappindicator3-1
          npm install -g playwright
          sudo npx playwright install-deps
          npx playwright install chromium

      - name: Build Java Project
        run: mvn install -DskipTests

      - name: Run Capture
        run: mvn exec:java -Dexec.mainClass="TradingViewAutoCapture" -Dexec.args="${{ github.event.inputs.symbols }}"

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: TradingView-Charts-${{ github.event.inputs.symbols }}-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: warn
