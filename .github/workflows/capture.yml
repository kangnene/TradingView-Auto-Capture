name: TradingView Chart Capture

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: '캡처할 종목 (예: NASDAQ:NDX, TSLA, AAPL)'
        required: true
        default: 'NASDAQ:NDX'

jobs:
  capture-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create auth.json from Secrets
        run: echo '${{ secrets.TRADINGVIEW_AUTH }}' > auth.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 에러 해결 포인트: 브라우저 설치 명령어를 더 확실하게 바꿨습니다.
      - name: Install Playwright Browsers
        run: |
          mvn install -DskipTests
          # 아래 명령어가 핵심입니다: 시스템에 필요한 모든 라이브러리를 강제로 설치합니다.
          sudo npx playwright install-deps
          mvn exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install --with-deps chromium"

      - name: Run Capture
        run: mvn exec:java -Dexec.mainClass="TradingViewAutoCapture" -Dexec.args="${{ github.event.inputs.symbols }}"

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: TradingView-Charts-${{ github.event.inputs.symbols }}
          path: screenshots/
          if-no-files-found: warn
