name: TradingView Chart Capture

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: '캡처할 종목 (예: TSLA,AAPL,NVDA)'
        required: true
        default: 'NDX'

jobs:
  capture-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create auth.json from Secrets
        run: echo '${{ secrets.TRADINGVIEW_AUTH }}' > auth.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright Browsers
        run: mvn exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install --with-deps chromium"

      - name: Run Capture
        run: mvn exec:java -Dexec.mainClass="NasdaqCapture" -Dexec.args="${{ github.event.inputs.symbols }}"

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: nasdaq-charts
          path: screenshots/*.jpg
