name: TradingView Chart Capture

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: '캡처할 종목 (예: NASDAQ:NDX, TSLA, AAPL)'
        required: true
        default: 'NASDAQ:NDX'

jobs:
  capture-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create auth.json from Secrets
        run: |
          echo '${{ secrets.TRADINGVIEW_AUTH }}' > auth.json
          ls -l auth.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright Browsers
        run: |
          mvn install -DskipTests
          sudo npx playwright install-deps
          # 자바 명령어로 크롬을 깔아야 버전 충돌이 없습니다.
          mvn exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install chromium"

      - name: Build Java Project
        run: mvn install -DskipTests

      - name: Run Capture
        run: mvn exec:java -Dexec.mainClass="TradingViewAutoCapture" -Dexec.args="${{ github.event.inputs.symbols }}"

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          # 종목 이름(${{ github.event.inputs.symbols }}) 대신 고정된 이름을 사용합니다.
          # 콜론(:) 같은 특수문자 에러를 방지하기 위해서입니다.
          name: TradingView-Capture-Result-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: warn
