name: TradingView Chart Capture

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: '캡처할 종목 (예: NASDAQ:NDX, TSLA, AAPL)'
        required: true
        default: 'NASDAQ:NDX'

jobs:
  capture-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create auth.json from Secrets
        run: |
          echo '${{ secrets.TRADINGVIEW_AUTH }}' > auth.json
          ls -l auth.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright Browsers
        run: |
          mvn install -DskipTests
          sudo npx playwright install-deps
          mvn exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install chromium"

      - name: Build Java Project
        run: mvn install -DskipTests

      - name: Run Capture
        run: mvn exec:java -Dexec.mainClass="TradingViewAutoCapture" -Dexec.args="${{ github.event.inputs.symbols }}"

      - name: Commit and Push Screenshots
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f screenshots/   # <- 여기가 바뀌었어요! -f 추가
          git commit -m "Daily screenshots $(date +%F)" || echo "No changes"
          git push
